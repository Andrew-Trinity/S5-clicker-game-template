<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clicker Game — Task 1</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 24px; }
    .card { max-width: 520px; margin: 0 auto; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .btn { background: #4f46e5; color: #fff; border: none; border-radius: 10px; padding: 10px 16px; cursor: pointer; }
    .btn.secondary { background: #64748b; }
    .count { font-size: 2rem; font-weight: 700; margin: 8px 0; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Clicker Game — Task 1</h1>
    <p id="desc">Click the button to increase your score. Reset sets score back to 0.</p>

    <div class="count" aria-live="polite" aria-atomic="true">
      Score: <span id="score">0</span>
    </div>

    <div class="row">
      <button id="clickBtn" class="btn" aria-describedby="desc">Click me!</button>
      <button id="resetBtn" class="btn secondary">Reset</button>
    </div>

    <p id="a11yStatus" class="sr-only" aria-live="polite"></p>
  </main>

  <script src="./script.js"></script>
</body>
</html>
